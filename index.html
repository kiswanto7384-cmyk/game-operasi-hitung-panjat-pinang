<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duel Panjat Pinang - SDN 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #sky-400; font-family: 'sans-serif'; overflow: hidden; background: linear-gradient(to bottom, #87ceeb, #f0f9ff); }
        .pole-bg { 
            width: 40px; height: 65vh; background: #5d4037; 
            margin: 0 auto; position: relative; border-radius: 20px;
            box-shadow: inset -10px 0 10px rgba(0,0,0,0.3), 10px 0 20px rgba(0,0,0,0.1);
            border: 4px solid #3e2723;
        }
        .prize-circle {
            position: absolute; top: -60px; left: -40px; width: 120px; height: 120px;
            background: url('https://www.svgrepo.com/show/396611/gift.svg') no-repeat center;
            background-size: contain; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
        }
        .char {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            font-size: 60px; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
            z-index: 20;
        }
        .grass { position: fixed; bottom: 0; width: 100%; height: 80px; background: #2e7d32; z-index: 5; border-top: 8px solid #1b5e20; }
        .lane { height: 100vh; border-right: 2px dashed rgba(255,255,255,0.5); }
        .answer-btn { 
            touch-action: manipulation; transition: transform 0.1s; 
            box-shadow: 0 6px 0 #1e3a8a;
        }
        .answer-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #1e3a8a; }
    </style>
</head>
<body>

    <div id="setup" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-5xl font-black text-orange-600 mb-4 uppercase italic">🚩 DUEL PANJAT PINANG</h1>
        <p class="text-xl font-bold text-blue-900 mb-8">Siapa yang paling cepat sampai ke puncak hadiah?</p>
        
        <div class="bg-blue-50 p-8 rounded-[3rem] border-4 border-blue-200 shadow-2xl w-full max-w-2xl">
            <h3 class="font-black mb-4 uppercase tracking-widest text-blue-800">Pilih Level Operasi Hitung:</h3>
            <div class="grid grid-cols-3 gap-4 mb-8">
                <button onclick="start(1)" class="bg-green-500 text-white p-6 rounded-2xl font-black text-2xl border-b-8 border-green-700 hover:bg-green-400">MUDAH</button>
                <button onclick="start(2)" class="bg-yellow-500 text-white p-6 rounded-2xl font-black text-2xl border-b-8 border-yellow-700 hover:bg-yellow-400">SEDANG</button>
                <button onclick="start(3)" class="bg-red-500 text-white p-6 rounded-2xl font-black text-2xl border-b-8 border-red-700 hover:bg-red-400">SULIT</button>
            </div>
            <p class="text-gray-500 font-bold italic text-sm">Game ini dirancang khusus untuk layar sentuh IFP/Interactive Board.</p>
        </div>
    </div>

    <div class="grid grid-cols-2 w-full h-screen">
        
        <div class="lane flex flex-col items-center justify-between py-10 relative">
            <div class="pole-bg">
                <div class="prize-circle"></div>
                <div id="char1" class="char">👦</div>
            </div>
            <div class="z-10 w-full px-6 mb-16">
                <div id="q1" class="text-4xl font-black text-center bg-white p-4 rounded-2xl shadow-xl mb-4 border-4 border-blue-600">Loading...</div>
                <div id="opt1" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div class="absolute top-4 left-4 bg-blue-600 text-white px-4 py-2 rounded-full font-bold">PEMAIN 1</div>
        </div>

        <div class="lane flex flex-col items-center justify-between py-10 relative bg-black/5">
            <div class="pole-bg">
                <div class="prize-circle"></div>
                <div id="char2" class="char">👧</div>
            </div>
            <div class="z-10 w-full px-6 mb-16">
                <div id="q2" class="text-4xl font-black text-center bg-white p-4 rounded-2xl shadow-xl mb-4 border-4 border-red-600">Loading...</div>
                <div id="opt2" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div class="absolute top-4 right-4 bg-red-600 text-white px-4 py-2 rounded-full font-bold">PEMAIN 2</div>
        </div>

    </div>

    <div class="grass"></div>

    <script>
        let lvl = 1;
        let p1_pos = 0, p2_pos = 0;
        let soal1 = {}, soal2 = {};

        function start(l) {
            lvl = l;
            document.getElementById('setup').style.display = 'none';
            generateSoal(1);
            generateSoal(2);
        }

        function generateSoal(p) {
            let n1, n2, op, ans;
            const ops = ['+', '-'];
            if(lvl >= 2) ops.push('*');
            
            op = ops[Math.floor(Math.random() * ops.length)];

            if(lvl === 1) { n1 = rand(1,10); n2 = rand(1,10); }
            else if(lvl === 2) { n1 = rand(10,30); n2 = rand(2,10); }
            else { n1 = rand(20,99); n2 = rand(10,50); }

            if(op === '+') ans = n1 + n2;
            else if(op === '-') { n1 = Math.max(n1, n2); n2 = Math.min(n1, n2); ans = n1 - n2; }
            else if(op === '*') { n1 = rand(2,9); n2 = rand(2,9); ans = n1 * n2; }

            const sObj = { n1, n2, op: op === '*' ? '×' : op, ans };
            const opts = [ans, ans + rand(1,3), ans - rand(1,3)].sort(() => Math.random() - 0.5);

            if(p === 1) {
                soal1 = sObj;
                document.getElementById('q1').innerText = `${n1} ${sObj.op} ${n2}`;
                renderOpts(1, opts);
            } else {
                soal2 = sObj;
                document.getElementById('q2').innerText = `${n1} ${sObj.op} ${n2}`;
                renderOpts(2, opts);
            }
        }

        function renderOpts(p, opts) {
            const container = document.getElementById(`opt${p}`);
            container.innerHTML = "";
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = `answer-btn ${p===1?'bg-blue-600':'bg-red-600'} text-white text-3xl font-black py-6 rounded-3xl border-b-8 border-black/20`;
                b.innerText = o;
                b.onclick = () => check(p, o);
                container.appendChild(b);
            });
        }

        function check(p, val) {
            const s = (p === 1) ? soal1 : soal2;
            if(val === s.ans) {
                if(p === 1) { p1_pos += 8; move(1, p1_pos); }
                else { p2_pos += 8; move(2, p2_pos); }
            } else {
                // Jika salah, merosot sedikit
                if(p === 1) { p1_pos = Math.max(0, p1_pos - 5); move(1, p1_pos); }
                else { p2_pos = Math.max(0, p2_pos - 5); move(2, p2_pos); }
            }
            
            if(p1_pos >= 90) win(1);
            else if(p2_pos >= 90) win(2);
            else generateSoal(p);
        }

        function move(p, pos) {
            document.getElementById(`char${p}`).style.bottom = pos + "%";
        }

        function win(p) {
            alert(`🎉 PEMAIN ${p} MENANG! Berhasil mengambil hadiah di puncak!`);
            location.reload();
        }

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    </script>
</body>
</html>
