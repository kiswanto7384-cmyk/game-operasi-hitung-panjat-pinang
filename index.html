<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duel Panjat Pinang Pro - SDN 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(to bottom, #87ceeb 0%, #e0f2fe 100%);
            font-family: sans-serif; overflow: hidden; height: 100vh; margin: 0;
        }

        /* --- SETUP LAYAR UTAMA (PALING DEPAN) --- */
        #setup {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- POHON & ARENA (DITINGGIKAN POSISINYA) --- */
        .pole-container {
            position: absolute; left: 50%; bottom: 250px; /* Diangkat agar tidak tertutup papan */
            transform: translateX(-50%); width: 200px; height: 60vh; z-index: 10;
        }

        .pole-center {
            position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
            width: 40px; height: 100%; background: #5d4037 url('https://www.transparenttextures.com/patterns/dark-wood.png');
            border-radius: 20px; box-shadow: inset -10px 0 10px rgba(0,0,0,0.4);
            border: 4px solid #3e2723;
        }

        .puncak-hadiah {
            position: absolute; top: -90px; left: 50%; transform: translateX(-50%);
            width: 250px; text-align: center;
        }
        .item-hadiah { font-size: 40px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); display: inline-block; margin: 0 5px; }

        .clomber {
            position: absolute; width: 80px; height: 80px;
            background-size: contain; background-repeat: no-repeat;
            transition: bottom 0.4s ease-out; z-index: 20;
        }
        /* Gambar realistik anak SD memanjat */
        #p1_char { background-image: url('https://cdn-icons-png.flaticon.com/512/3997/3997839.png'); left: -75px; }
        #p2_char { background-image: url('https://cdn-icons-png.flaticon.com/512/3997/3997863.png'); right: -75px; }

        /* --- PANEL JAWABAN (FIXED DI BAWAH, TRANSPARAN SEDIKIT) --- */
        #game-ui { display: none; }
        .answer-panel-container {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 240px; background: rgba(255, 255, 255, 0.7); /* Transparan dikit agar tembus pandang */
            backdrop-filter: blur(5px); z-index: 50; padding: 20px;
            border-top: 4px solid #e2e8f0;
        }

        .ans-btn { cursor: pointer; touch-action: manipulation; transition: all 0.1s; }
        .ans-btn:active { transform: scale(0.9); }
        
        .grass { position: fixed; bottom: 0; width: 100%; height: 60px; background: #2e7d32; z-index: 5; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 class="text-5xl font-black text-orange-600 mb-2 italic drop-shadow">DUEL PANJAT PINANG PRO</h1>
        <p class="text-xl font-bold text-blue-900 mb-10">Balapan Ambil Hadiah & Panjat Pohon Realistik! 🎁🚲🏆</p>
        
        <div class="grid grid-cols-1 gap-4 w-64 bg-blue-50 p-6 rounded-3xl border-2 border-blue-200 shadow-xl">
            <h3 class="text-xs font-black uppercase text-blue-700 mb-2 text-center">Pilih Level:</h3>
            <button onclick="start(1)" class="bg-green-500 text-white p-6 rounded-2xl font-black text-2xl border-b-8 border-green-700 active:border-0 transition-all">MUDAH</button>
            <button onclick="start(2)" class="bg-yellow-500 text-white p-6 rounded-2xl font-black text-2xl border-b-8 border-yellow-700 active:border-0 transition-all">SEDANG</button>
            <button onclick="start(3)" class="bg-red-500 text-white p-6 rounded-2xl font-black text-2xl border-b-8 border-red-700 active:border-0 transition-all">SULIT</button>
        </div>
    </div>

    <div id="game-arena" class="relative w-full h-screen">
        
        <div class="pole-container">
            <div class="pole-center">
                <div class="puncak-hadiah">
                    <span class="item-hadiah">🚲</span><span class="item-hadiah">🏆</span><span class="item-hadiah">🎁</span>
                </div>
                <div id="p1_char" class="clomber" style="bottom: 0;"></div>
                <div id="p2_char" class="clomber" style="bottom: 0;"></div>
            </div>
        </div>

        <div id="game-ui">
            <div class="answer-panel-container grid grid-cols-2 gap-8">
                <div class="bg-blue-600/90 p-4 rounded-3xl shadow-2xl border-4 border-white flex flex-col justify-center">
                    <div class="absolute top-2 left-4 text-[10px] font-bold text-white uppercase">Siswa 1</div>
                    <div id="q1" class="bg-white text-3xl font-black text-center p-3 rounded-xl mb-3 text-gray-800">...</div>
                    <div id="opt1" class="grid grid-cols-2 gap-2"></div>
                </div>
                <div class="bg-red-600/90 p-4 rounded-3xl shadow-2xl border-4 border-white flex flex-col justify-center">
                    <div class="absolute top-2 right-4 text-[10px] font-bold text-white uppercase">Siswa 2</div>
                    <div id="q2" class="bg-white text-3xl font-black text-center p-3 rounded-xl mb-3 text-gray-800">...</div>
                    <div id="opt2" class="grid grid-cols-2 gap-2"></div>
                </div>
            </div>
        </div>

        <div class="grass"></div>
    </div>

    <script>
        let lvl = 1, p1_pos = 0, p2_pos = 0, s1 = {}, s2 = {};

        function start(l) {
            lvl = l;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            newSoal(1);
            newSoal(2);
        }

        function newSoal(p) {
            let n1, n2, op, ans;
            const ops = lvl === 1 ? ['+', '-'] : ['+', '-', '*'];
            op = ops[Math.floor(Math.random() * ops.length)];

            if(lvl === 1) { n1 = rand(1,10); n2 = rand(1,10); }
            else if(lvl === 2) { n1 = rand(10,30); n2 = rand(2,10); }
            else { n1 = rand(10,50); n2 = rand(2,12); }

            if(op === '+') ans = n1 + n2;
            else if(op === '-') { n1 = Math.max(n1, n2); n2 = Math.min(n1, n2); ans = n1 - n2; }
            else { n1 = rand(2,9); n2 = rand(2,9); ans = n1 * n2; }

            const obj = { txt: `${n1} ${op==='*'?'×':(op==='-'?'-':'+')} ${n2}`, ans };
            const opts = [ans, ans+rand(1,3), ans-rand(1,3)].sort(()=>Math.random()-0.5);

            if(p === 1) { s1 = obj; document.getElementById('q1').innerText = obj.txt; render(1, opts); }
            else { s2 = obj; document.getElementById('q2').innerText = obj.txt; render(2, opts); }
        }

        function render(p, opts) {
            const div = document.getElementById(`opt${p}`);
            div.innerHTML = "";
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "bg-white text-gray-800 text-xl font-black py-3 rounded-xl shadow ans-btn";
                b.innerText = o;
                b.onclick = () => {
                    const correct = (p === 1) ? s1.ans : s2.ans;
                    if(o === correct) {
                        if(p === 1) p1_pos += 8; else p2_pos += 8;
                    } else {
                        if(p === 1) p1_pos = Math.max(0, p1_pos - 4); else p2_pos = Math.max(0, p2_pos - 4);
                    }
                    document.getElementById('p1_char').style.bottom = p1_pos + "%";
                    document.getElementById('p2_char').style.bottom = p2_pos + "%";
                    
                    if(p1_pos >= 90) { alert("Siswa 1 (👦Paman) MENANG! 🏆 Berhasil mengambil hadiah!"); location.reload(); }
                    else if(p2_pos >= 90) { alert("Siswa 2 (👧Siti) MENANG! 🏆 Berhasil mengambil hadiah!"); location.reload(); }
                    else newSoal(p);
                };
                div.appendChild(b);
            });
        }

        function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
    </script>
</body>
</html>
