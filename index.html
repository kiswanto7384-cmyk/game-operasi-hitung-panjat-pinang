<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duel Panjat Pinang Pro - SDN 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(to bottom, #87ceeb 0%, #e0f2fe 100%);
            font-family: sans-serif; overflow: hidden; height: 100vh;
        }

        /* --- VISUAL POHON PINANG REALISTIK (Tengah) --- */
        .pole-center {
            position: absolute; left: 50%; bottom: 80px; transform: translateX(-50%);
            width: 50px; height: 60vh;
            background: #5d4037 url('https://www.transparenttextures.com/patterns/dark-wood.png'); /* Tekstur Kayu */
            border-radius: 25px;
            box-shadow: inset -15px 0 15px rgba(0,0,0,0.4), 10px 10px 20px rgba(0,0,0,0.1);
            border: 5px solid #3e2723; z-index: 10;
        }

        /* Tumpukan Hadiah di Puncak */
        .puncak-hadiah {
            position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
            width: 250px; height: 150px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;
            z-index: 15;
        }
        .item-hadiah { font-size: 40px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); }

        /* --- KARAKTER PEMANJAT REALISTIK --- */
        .clomber {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 80px; height: 100px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            filter: drop-shadow(0 8px 5px rgba(0,0,0,0.3)); z-index: 20;
        }
        /* Gambar anak SD laki-laki memanjat */
        #p1_char { background-image: url('https://img.icons8.com/?size=512&id=113702&format=png'); }
        /* Gambar anak SD perempuan memanjat */
        #p2_char { background-image: url('https://img.icons8.com/?size=512&id=113670&format=png'); }

        .grass { position: fixed; bottom: 0; width: 100%; height: 80px; background: #2e7d32; border-top: 8px solid #1b5e20; z-index: 5; }
        
        /* Tombol Jawaban Besar untuk IFP */
        .ans-btn { touch-action: manipulation; border-bottom: 8px solid rgba(0,0,0,0.2); transition: all 0.1s; }
        .ans-btn:active { transform: translateY(4px); border-bottom-width: 2px; }
    </style>
</head>
<body>

    <div id="setup" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-6xl font-black text-orange-600 mb-6 uppercase italic drop-shadow-lg">DUEL PANJAT PINANG PRO</h1>
        <p class="text-2xl font-bold text-blue-900 mb-10">Balapan Panjat Pohon & Ambil Hadiah di Puncak! 🎁🏆</p>
        
        <div class="bg-blue-50 p-10 rounded-[3rem] border-4 border-blue-200 shadow-2xl w-full max-w-3xl">
            <h3 class="font-black text-2xl mb-6 uppercase text-blue-800 tracking-wider">Pilih Jarak Operasi Hitung:</h3>
            <div class="grid grid-cols-3 gap-6">
                <button onclick="start(1)" class="bg-green-500 text-white p-8 rounded-2xl font-black text-3xl hover:bg-green-400">MUDAH</button>
                <button onclick="start(2)" class="bg-yellow-500 text-white p-8 rounded-2xl font-black text-3xl hover:bg-yellow-400">SEDANG</button>
                <button onclick="start(3)" class="bg-red-500 text-white p-8 rounded-2xl font-black text-3xl hover:bg-red-400">SULIT</button>
            </div>
        </div>
    </div>

    <div class="relative w-full h-screen overflow-hidden">
        
        <div class="pole-center">
            <div class="puncak-hadiah">
                <span class="item-hadiah">🚲</span> <span class="item-hadiah">🎁</span> <span class="item-hadiah">🏆</span>
                <span class="item-hadiah">🎒</span> <span class="item-hadiah">📚</span> <span class="item-hadiah">🍕</span>
            </div>
            
            <div id="p1_char" class="clomber" style="bottom: 0%; margin-left: -60px;"></div>
            <div id="p2_char" class="clomber" style="bottom: 0%; margin-left: 60px;"></div>
        </div>

        <div class="fixed bottom-10 left-0 right-0 grid grid-cols-2 gap-10 px-10 z-30">
            
            <div class="p-6 bg-blue-100/80 backdrop-blur rounded-[2.5rem] border-4 border-blue-600 shadow-xl">
                <div class="absolute -top-4 -left-4 bg-blue-600 text-white px-5 py-2 rounded-full font-bold text-xs">SISWA 1 (Paman👦)</div>
                <div id="q1" class="text-4xl font-black text-center bg-white p-5 rounded-3xl shadow-md mb-5 text-gray-800">...</div>
                <div id="opt1" class="grid grid-cols-2 gap-4"></div>
            </div>

            <div class="p-6 bg-red-100/80 backdrop-blur rounded-[2.5rem] border-4 border-red-600 shadow-xl">
                <div class="absolute -top-4 -right-4 bg-red-600 text-white px-5 py-2 rounded-full font-bold text-xs">SISWA 2 (Siti👧)</div>
                <div id="q2" class="text-4xl font-black text-center bg-white p-5 rounded-3xl shadow-md mb-5 text-gray-800">...</div>
                <div id="opt2" class="grid grid-cols-2 gap-4"></div>
            </div>

        </div>

        <div class="grass"></div>
    </div>

    <script>
        let lvl = 1;
        let p1_pos = 0, p2_pos = 0;
        let soal1 = {}, soal2 = {};

        function start(l) {
            lvl = l;
            document.getElementById('setup').style.display = 'none';
            generateSoal(1);
            generateSoal(2);
        }

        function generateSoal(p) {
            let n1, n2, op, ans;
            const ops = ['+', '-'];
            if(lvl >= 2) ops.push('*');
            
            op = ops[Math.floor(Math.random() * ops.length)];

            if(lvl === 1) { n1 = rand(1,10); n2 = rand(1,10); }
            else if(lvl === 2) { n1 = rand(10,30); n2 = rand(2,10); }
            else { n1 = rand(20,99); n2 = rand(10,50); }

            if(op === '+') ans = n1 + n2;
            else if(op === '-') { n1 = Math.max(n1, n2); n2 = Math.min(n1, n2); ans = n1 - n2; }
            else if(op === '*') { n1 = rand(2,9); n2 = rand(2,9); ans = n1 * n2; }

            const sObj = { n1, n2, op: op === '*' ? '×' : op, ans };
            const opts = [ans, ans + rand(1,4), ans - rand(1,4)].sort(() => Math.random() - 0.5);

            if(p === 1) {
                soal1 = sObj;
                document.getElementById('q1').innerText = `${n1} ${sObj.op} ${n2}`;
                renderOpts(1, opts);
            } else {
                soal2 = sObj;
                document.getElementById('q2').innerText = `${n1} ${sObj.op} ${n2}`;
                renderOpts(2, opts);
            }
        }

        function renderOpts(p, opts) {
            const container = document.getElementById(`opt${p}`);
            container.innerHTML = "";
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = `ans-btn ${p===1?'bg-blue-600':'bg-red-600'} text-white text-4xl font-black py-7 rounded-3xl`;
                b.innerText = o;
                b.onclick = () => check(p, o);
                container.appendChild(b);
            });
        }

        function check(p, val) {
            const s = (p === 1) ? soal1 : soal2;
            if(val === s.ans) {
                if(p === 1) { p1_pos += 8; moveChar(1, p1_pos); }
                else { p2_pos += 8; moveChar(2, p2_pos); }
            } else {
                if(p === 1) { p1_pos = Math.max(0, p1_pos - 5); moveChar(1, p1_pos); }
                else { p2_pos = Math.max(0, p2_pos - 5); moveChar(2, p2_pos); }
            }

            if(p1_pos >= 90) win(
