<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duel Panjat Pinang Pro - SDN 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(to bottom, #87ceeb 0%, #e0f2fe 100%);
            font-family: sans-serif; overflow: hidden; height: 100vh; margin: 0;
        }

        /* --- VISUAL POHON PINANG REALISTIK (Tengah) --- */
        .pole-center {
            position: absolute; left: 50%; bottom: 80px; transform: translateX(-50%);
            width: 45px; height: 65vh;
            background: #5d4037;
            border-radius: 25px;
            box-shadow: inset -15px 0 15px rgba(0,0,0,0.4);
            border: 4px solid #3e2723; z-index: 10;
        }

        .puncak-hadiah {
            position: absolute; top: -110px; left: 50%; transform: translateX(-50%);
            width: 260px; text-align: center; z-index: 15;
        }
        .item-hadiah { font-size: 45px; display: inline-block; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); }

        /* --- KARAKTER PEMANJAT --- */
        .clomber {
            position: absolute; width: 80px; height: 80px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: bottom 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 20; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
        }
        /* Menggunakan Icon yang lebih stabil */
        #p1_char { background-image: url('https://cdn-icons-png.flaticon.com/512/3997/3997839.png'); left: -75px; }
        #p2_char { background-image: url('https://cdn-icons-png.flaticon.com/512/3997/3997863.png'); right: -75px; }

        .grass { position: fixed; bottom: 0; width: 100%; height: 80px; background: #2e7d32; border-top: 8px solid #1b5e20; z-index: 5; }
        
        /* Tombol Jawaban */
        .ans-btn { touch-action: manipulation; transition: transform 0.1s; }
        .ans-btn:active { transform: scale(0.95); }

        /* Overlay Setup - DIPASTIKAN PALING ATAS */
        #setup {
            position: fixed; inset: 0; background: white; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="setup">
        <h1 class="text-6xl font-black text-orange-600 mb-4 italic">DUEL PANJAT PINANG</h1>
        <p class="text-2xl font-bold text-blue-900 mb-10">Balapan Ambil Hadiah di Puncak! 🎁</p>
        
        <div class="bg-blue-50 p-10 rounded-[3rem] border-4 border-blue-200 shadow-2xl w-[90%] max-w-2xl">
            <h3 class="font-black text-xl mb-6 uppercase text-blue-800">Pilih Level:</h3>
            <div class="grid grid-cols-3 gap-4">
                <button onclick="start(1)" class="bg-green-500 text-white p-6 rounded-2xl font-black text-2xl border-b-8 border-green-700">MUDAH</button>
                <button onclick="start(2)" class="bg-yellow-500 text-white p-6 rounded-2xl font-black text-2xl border-b-8 border-yellow-700">SEDANG</button>
                <button onclick="start(3)" class="bg-red-500 text-white p-6 rounded-2xl font-black text-2xl border-b-8 border-red-700">SULIT</button>
            </div>
        </div>
    </div>

    <div class="relative w-full h-screen">
        <div class="pole-center">
            <div class="puncak-hadiah">
                <span class="item-hadiah">🚲</span><span class="item-hadiah">🏆</span><span class="item-hadiah">🎁</span>
            </div>
            <div id="p1_char" class="clomber" style="bottom: 0;"></div>
            <div id="p2_char" class="clomber" style="bottom: 0;"></div>
        </div>

        <div class="fixed bottom-10 left-0 right-0 grid grid-cols-2 gap-8 px-10 z-50">
            <div class="bg-blue-600/90 p-5 rounded-[2rem] shadow-2xl border-4 border-white">
                <div id="q1" class="bg-white text-3xl font-black text-center p-4 rounded-xl mb-4">...</div>
                <div id="opt1" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div class="bg-red-600/90 p-5 rounded-[2rem] shadow-2xl border-4 border-white">
                <div id="q2" class="bg-white text-3xl font-black text-center p-4 rounded-xl mb-4">...</div>
                <div id="opt2" class="grid grid-cols-2 gap-3"></div>
            </div>
        </div>

        <div class="grass"></div>
    </div>

    <script>
        let lvl = 1;
        let p1_pos = 0, p2_pos = 0;
        let s1 = {}, s2 = {};

        function start(l) {
            lvl = l;
            document.getElementById('setup').style.display = 'none';
            newSoal(1);
            newSoal(2);
        }

        function newSoal(p) {
            let n1, n2, op, ans;
            const ops = lvl === 1 ? ['+', '-'] : ['+', '-', '*'];
            op = ops[Math.floor(Math.random() * ops.length)];

            if(lvl === 1) { n1 = rand(1,10); n2 = rand(1,10); }
            else if(lvl === 2) { n1 = rand(10,30); n2 = rand(2,10); }
            else { n1 = rand(20,99); n2 = rand(11,50); }

            if(op === '+') ans = n1 + n2;
            else if(op === '-') { n1 = Math.max(n1, n2); n2 = Math.min(n1, n2); ans = n1 - n2; }
            else { n1 = rand(2,9); n2 = rand(2,9); ans = n1 * n2; }

            const obj = { txt: `${n1} ${op==='*'?'×':op} ${n2}`, ans };
            const opts = [ans, ans+rand(1,3), ans-rand(1,3)].sort(()=>Math.random()-0.5);

            if(p === 1) { s1 = obj; document.getElementById('q1').innerText = obj.txt; render(1, opts); }
            else { s2 = obj; document.getElementById('q2').innerText = obj.txt; render(2, opts); }
        }

        function render(p, opts) {
            const div = document.getElementById(`opt${p}`);
            div.innerHTML = "";
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "bg-white text-gray-800 text-2xl font-black py-4 rounded-xl shadow-lg ans-btn";
                b.innerText = o;
                b.onclick = () => {
                    const correct = (p === 1) ? s1.ans : s2.ans;
                    if(o === correct) {
                        if(p === 1) { p1_pos += 7; } else { p2_pos += 7; }
                    } else {
                        if(p === 1) { p1_pos = Math.max(0, p1_pos - 5); } else { p2_pos = Math.max(0, p2_pos - 5); }
                    }
                    updatePos();
                    if(p1_pos >= 90) end(1); else if(p2_pos >= 90) end(2); else newSoal(p);
                };
                div.appendChild(b);
            });
        }

        function updatePos() {
            document.getElementById('p1_char').style.bottom = p1_pos + "%";
            document.getElementById('p2_char').style.bottom = p2_pos + "%";
        }

        function end(p) {
            alert(`Pemain ${p} Menang! 🏆`);
            location.reload();
        }

        function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
    </script>
</body>
</html>
